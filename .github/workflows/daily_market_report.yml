name: Daily Market OHLC Report

on:
  schedule:
    # 10:30 UTC = 4:00 PM IST, Mon-Fri (after market close at 3:30 PM IST)
    - cron: '30 10 * * 1-5'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

permissions:
  contents: write   # needed so the workflow can commit the updated history log

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and send report
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python fetch_market_data.py

      - name: Commit updated history log
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update market OHLC history log"
          file_pattern: data/history.csv
